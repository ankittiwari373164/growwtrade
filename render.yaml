services:
  - type: web
    name: window-signals
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHBOARD_SECRET
        sync: false
      - key: ENABLE_SCRAPE
        value: "true"
      - key: TOP_N
        value: "8"
